name: Auto-update Index

on:
  push:
    branches: [main]
    paths:
      - 'skills/*.md'
      - 'docs/*.md'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    # Skip nếu commit là từ auto-update chính nó (avoid loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt

      - name: Regenerate skills/README + docs/README
        run: python3 scripts/generate_index.py

      - name: Commit nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/README.md docs/README.md
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore(docs): auto-update README index [skip ci]"
          git push
