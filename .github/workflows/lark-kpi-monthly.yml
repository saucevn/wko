name: Monthly KPI Report

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 1 * *'                         # 1st of month, 1h UTC

jobs:
  kpi:
    runs-on: ubuntu-latest
    if: vars.LARK_INTEGRATION_ENABLED == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt

      - name: Install lark-cli
        uses: ./.github/actions/setup-lark-cli
        with:
          min-version: '1.0.30'

      - name: Auth lark-cli as bot
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          lark-cli auth login --as bot --app-id "$LARK_APP_ID" --app-secret "$LARK_APP_SECRET"

      - name: Decrypt config
        run: |
          echo "${{ secrets.COMPANY_CONFIG_B64 }}" | base64 -d > company.config.yaml
          python3 scripts/validate_config.py --strict

      - name: Generate KPI report
        run: |
          python3 scripts/wiki_kpi_report.py --push-to-lark || \
            python3 scripts/wiki_kpi_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpi-report-${{ github.run_number }}
          path: dist/kpi-*.md
          retention-days: 90

      - name: Audit content quality
        run: |
          # Run audit if we have a wiki snapshot
          if [ -f dist/wiki-tree.json ]; then
            python3 scripts/content_quality_audit.py --input-json dist/wiki-tree.json || true
          fi

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-audit-${{ github.run_number }}
          path: dist/quality-audit.md
          retention-days: 90
          if-no-files-found: ignore
