name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - name: Validate folder + .gitignore structure
        run: python3 scripts/validate_structure.py

  config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - name: Validate company.config.yaml.example schema (V4.1)
        run: |
          cp company.config.yaml.example company.config.yaml
          python3 scripts/validate_config.py --strict

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - run: pip install -r scripts/requirements.txt
      - name: Pytest (non-interactive)
        run: pytest -m "not interactive" --cov=scripts --cov-report=term-missing
